name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv run --with pytest --with httpx python -m pytest -s tests/unit

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - name: Build pinned Agent Zero image
        run: docker build -t provider-agent-zero-ci -f ci/agent-zero.Dockerfile .
      - run: bash ci/run_agent_zero_integration.sh
        env:
          AGENT_ZERO_IMAGE: provider-agent-zero-ci
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: provider-integration-artifacts
          path: artifacts/

  live:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - name: Run required live provider smoke
        env:
          OPENCODE_GO_API_KEY: ${{ secrets.OPENCODE_GO_API_KEY }}
        run: uv run --with httpx python ci/run_live_provider_smoke.py
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: provider-live-catalog
          path: artifacts/
